services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: todolist
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    ports:
      - "3000:3000"
    environment:
      - JWT_SECRET=todo_app_secret_key_change_in_production
      - PORT=3000
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/todolist
      - FRONTEND_URL=http://localhost:5173
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build: ./frontend
    ports:
      - "5173:5173"
    environment:
      - VITE_API_TARGET=http://backend:3000
    depends_on:
      - backend

volumes:
  postgres_data:
